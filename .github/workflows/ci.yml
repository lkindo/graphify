name: CI

on:
  push:
    branches: ["v1", "v2", "v3", "v4", "main"]
  pull_request:
    branches: ["v1", "v2", "v3", "v4", "main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          python -m pip install --disable-pip-version-check uv==0.11.7

      - name: Verify dependency declarations are pinned
        run: |
          python scripts/check_pinned_dependencies.py

      - name: Verify lockfile is up to date
        run: |
          uv lock --check

      - name: Install frozen test dependencies
        run: |
          uv sync --group dev --extra mcp --extra pdf --extra watch --frozen

      - name: Run tests
        run: |
          uv run --no-sync --group dev pytest tests/ -q --tb=short

      - name: Verify install works end-to-end
        run: |
          uv run --no-sync graphify --help
          uv run --no-sync graphify install

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --disable-pip-version-check uv==0.11.7

      - name: Verify dependency declarations are pinned
        run: |
          python scripts/check_pinned_dependencies.py

      - name: Verify lockfile is up to date
        run: |
          uv lock --check

      - name: Install frozen audit tooling
        run: |
          uv sync --only-group dev --frozen

      - name: Audit locked dependencies
        run: |
          uv export --frozen --all-extras --all-groups --format requirements.txt --no-hashes --no-emit-project -o requirements-audit.txt
          uv run --no-sync --group dev pip-audit -r requirements-audit.txt --strict
