layers:
  - id: L0
    name: Code
    description: Source code modules with function/class relationships
    sources:
      - path: /Users/bytedance/Sources/graphify/worked_team/example/raw
        filter: "*.py"
      - path: /Users/bytedance/Sources/graphify/worked_team/httpx/raw
        filter: "*.py"
    route_keywords:
      - code
      - function
      - class
      - method
      - implementation
      - import
      - call
    aggregation:
      strategy: topk_filter
      params:
        top_k_nodes: 15
        min_confidence: INFERRED

  - id: L1
    name: Docs
    description: Documentation and architecture notes
    parent: L0
    sources:
      - path: /Users/bytedance/Sources/graphify/worked_team/example/raw
        filter: "*.md"
      - path: /Users/bytedance/Sources/graphify/worked_team/mixed-corpus/raw
        filter: "*.md"
    route_keywords:
      - doc
      - architecture
      - design
      - notes
      - documentation
    aggregation:
      strategy: community_collapse
      params:
        nodes_per_community: 3
        keep_bridge_edges: true

  - id: L2
    name: Overview
    description: System-wide architectural overview
    parent: L1
    sources:
      - path: /Users/bytedance/Sources/graphify/worked_team/mixed-corpus/raw
        filter: "*.py"
    route_keywords:
      - overview
      - system
      - architecture
      - high-level
      - summary
    aggregation:
      strategy: topk_filter
      params:
        top_k_nodes: 10
